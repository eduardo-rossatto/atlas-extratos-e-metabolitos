name: Keep Alive — ATLAS E&M

on:
  schedule:
    - cron: '0 */3 * * *'   # a cada 3h: 00, 03, 06, 09, 12, 15, 18, 21 UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Keepalive — evita GitHub desativar workflows
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git commit --allow-empty -m "chore: keepalive [skip ci]"
          git push
        continue-on-error: true

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Instalar Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Acordar ATLAS E&M
        run: |
          python - <<'EOF'
          from playwright.sync_api import sync_playwright

          url = "https://atlas-extratos-e-metabolitos.streamlit.app/"

          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              print(f"Abrindo {url}...")
              page.goto(url, wait_until="domcontentloaded", timeout=60000)
              page.wait_for_timeout(4000)

              woke = False
              for text in ["Yes, get this app back up!", "Yes, get it back up", "Wake up", "Yes"]:
                  try:
                      el = page.get_by_text(text, exact=False)
                      if el.count() > 0 and el.first.is_visible():
                          print(f"App dormindo — clicando '{text}'...")
                          el.first.click()
                          woke = True
                          break
                  except Exception:
                      pass

              if woke:
                  print("Aguardando app iniciar (até 3 min)...")
                  try:
                      page.wait_for_selector('[data-testid="stApp"]', timeout=180000)
                      print("App iniciado com sucesso.")
                  except Exception:
                      print("Timeout aguardando app — seguindo mesmo assim.")
                  page.wait_for_timeout(10000)
              else:
                  print("App já estava ativo.")
                  page.wait_for_timeout(15000)

              print("OK — sessão concluída.")
              browser.close()
          EOF
